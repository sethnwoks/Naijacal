services:
  # --- Backend: Django API (Native Python) ---
  - type: web
    name: naijacal-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python manage.py migrate && gunicorn core.wsgi:application
    envVars:
      - key: DEBUG
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: naijacal-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: GEMINI_MODEL_NAME
        value: gemini-2.5-flash
      - key: CORS_ALLOWED_ORIGINS
        value: https://naijacal-frontend.onrender.com

  # --- Frontend: React (Static Site) ---
  - type: web
    name: naijacal-frontend
    runtime: static
    buildCommand: cd frontend/frontend && npm install && npm run build
    staticPublishPath: frontend/frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://naijacal-backend.onrender.com

databases:
  - name: naijacal-db
    plan: free
